<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Self Healthy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#conteudo-principal" class="skip-link">Pular para o conteúdo principal</a>
  <header class="header">
    <div class="header-container">
      <h1 class="logo">Self <span>Healthy</span></h1>
      <nav class="nav" aria-label="Navegação principal">
        <a href="index.html" class="nav-tab">Início</a>
        <a href="login.html" class="nav-tab active" aria-current="page">Login</a>
        <a href="cadastro.html" class="nav-tab">Cadastrar</a>
      </nav>
    </div>
  </header>

  <main class="login-main" id="conteudo-principal" tabindex="-1">
    <section class="login-card" aria-labelledby="titulo-login">
      <h2 id="titulo-login">Entrar na sua conta</h2>
      <p class="login-subtitle">Acesse para continuar acompanhando suas dicas de saúde.</p>

      <form class="login-form" action="#" method="post">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" placeholder="seuemail@exemplo.com" required>

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" placeholder="Digite sua senha" required>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" name="lembrar">
            Lembrar de mim
          </label>
          <a href="#" class="forgot-password">Esqueci minha senha</a>
        </div>

        <button type="submit" class="login-button">Entrar</button>
      </form>

      <p class="register-text">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p>© 2026 Self Healthy. Conteúdo sobre saúde e bem-estar.</p>
      <nav class="footer-nav" aria-label="Links do rodapé">
        <a href="accessibility.html">Acessibilidade</a>
      </nav>
    </div>
  </footer>
</body>
</html>
